<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Example Messaging Patterns</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --fg: #1f2328;
    --muted: #59636e;
    --border: #d1d9e0;
    --code-bg: #f6f8fa;
    --link: #0969da;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --fg: #f0f6fc;
      --muted: #9198a1;
      --border: #3d444d;
      --code-bg: #151b23;
      --link: #4493f8;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    max-width: 900px;
    background: var(--bg);
    color: var(--fg);
    font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans",
      Helvetica, Arial, sans-serif;
  }
  h1, h2, h3 {
    line-height: 1.25;
    margin-top: 1.5em;
  }
  h1 { border-bottom: 1px solid var(--border); padding-bottom: .3em; }
  h2 { border-bottom: 1px solid var(--border); padding-bottom: .3em; }
  a { color: var(--link); }
  code, pre {
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas,
      "Liberation Mono", monospace;
    font-size: 85%;
  }
  code {
    background: var(--code-bg);
    padding: .2em .4em;
    border-radius: 6px;
  }
  pre {
    background: var(--code-bg);
    padding: 1em;
    border-radius: 6px;
    overflow-x: auto;
  }
  pre code { background: none; padding: 0; }
  pre.mermaid {
    background: none;
    display: flex;
    justify-content: center;
  }
  img { max-width: 100%; }
  footer {
    margin-top: 3rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 85%;
  }
</style>
</head>
<body>
<main id="content"><p>Loading…</p></main>
<footer>
  <a href="https://github.com/rangertaha/messaging-patterns">View on GitHub</a>
</footer>
<script type="module">
  import { marked } from 'https://cdn.jsdelivr.net/npm/marked@12/lib/marked.esm.js';
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';

  const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  mermaid.initialize({ startOnLoad: false, theme: dark ? 'dark' : 'default' });

  const md = await (await fetch('README.md')).text();
  const content = document.getElementById('content');
  content.innerHTML = marked.parse(md);

  // Convert ```mermaid fences (rendered as code blocks) into mermaid graphs.
  for (const block of content.querySelectorAll('code.language-mermaid')) {
    const pre = block.parentElement;
    const graph = document.createElement('pre');
    graph.className = 'mermaid';
    graph.textContent = block.textContent;
    pre.replaceWith(graph);
  }
  await mermaid.run({ nodes: content.querySelectorAll('pre.mermaid') });
</script>
</body>
</html>
